name: Bug Report
description: Report something that is not working correctly
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One sentence describing what is broken
      placeholder: Bar crashes when enabling the weather widget
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps to trigger the issue
      placeholder: |
        1. Enable weather widget in settings
        2. Restart shell with inir restart
        3. Bar crashes on startup
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen instead
      placeholder: Weather widget should display without errors
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: |
        Output from `inir logs` (last 50 lines or relevant errors).
        If the shell crashed, also include crash output if available.
      render: shell
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: "Output of: cat ~/.config/quickshell/inir/VERSION"
      placeholder: "2.17.4"
    validations:
      required: true

  - type: input
    id: compositor
    attributes:
      label: Compositor
      description: "Output of: niri msg version (or hyprctl version)"
      placeholder: "25.11"
    validations:
      required: true

  - type: input
    id: quickshell
    attributes:
      label: Quickshell version
      description: "Output of: qs --version"
      placeholder: "quickshell 0.2.1, revision abc1234, distributed by: Arch Linux"
    validations:
      required: true

  - type: input
    id: qt
    attributes:
      label: Qt version
      description: "Output of: pacman -Q qt6-base (or equivalent for your distro)"
      placeholder: "qt6-base 6.11.0-1.1"
    validations:
      required: true

  - type: input
    id: distro
    attributes:
      label: Distro
      description: Distribution name and version
      placeholder: "Arch Linux"
    validations:
      required: true

  - type: dropdown
    id: family
    attributes:
      label: Panel family
      options:
        - ii
        - waffle
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Relevant configuration
      description: Paste the relevant section from ~/.config/illogical-impulse/config.json if applicable
      render: json

  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      description: Screenshots, display scale, GPU info, or other context
